<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-store">
    <title>Gaussian Splat Viewer</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css?v=free-space-20260523">
    <script type="importmap">
      {
        "imports": {
          "playcanvas": "https://cdn.jsdelivr.net/npm/playcanvas/+esm"
        }
      }
    </script>
  </head>
  <body>
    <main id="app">
      <section id="empty" class="panel" hidden>
        <h1>No scene staged</h1>
        <p>Run <code>scripts/prepare_scene.sh path/to/scene.ply</code> to publish a Gaussian splat into this viewer.</p>
        <a href="https://superspl.at/editor" rel="noreferrer">Open SuperSplat</a>
      </section>
    </main>
    <div id="hud">
      <div class="hud-main">
        <strong id="title">Gaussian Splat Viewer</strong>
        <span id="metadata" hidden></span>
        <span id="qualityBadges" class="quality-badges" hidden></span>
        <span id="pipelineStatus" class="pipeline-status" hidden></span>
        <div id="pipelineSummary" class="pipeline-summary" hidden></div>
      </div>
      <select id="sceneSelect" aria-label="Scene" hidden></select>
      <span id="status">Starting</span>
      <a href="https://superspl.at/editor" rel="noreferrer">SuperSplat</a>
    </div>
    <div id="tools" aria-label="Coordinate tools">
      <button type="button" data-action="flip-y">Flip Y</button>
      <button type="button" data-action="flip-x">Flip X</button>
      <button type="button" data-action="flip-z">Flip Z</button>
      <button type="button" data-action="rotate-x">X 90</button>
      <button type="button" data-action="rotate-y">Y 90</button>
      <button type="button" data-action="rotate-z">Z 90</button>
      <button type="button" data-action="save">Save</button>
      <button type="button" data-action="copy">Copy JSON</button>
      <button type="button" data-action="reset">Reset</button>
      <button type="button" data-action="render-mesh" hidden>Mesh</button>
      <button type="button" data-action="render-points" hidden>Points</button>
      <button type="button" data-action="render-voxels" hidden>Voxel</button>
      <button type="button" data-action="render-free-space" hidden>Free</button>
      <button type="button" data-action="render-navigable" hidden>Move</button>
      <label class="range-tool" data-action="voxel-size" hidden>
        <span>Voxel size</span>
        <input type="range" min="1" max="16" step="1" value="5" aria-label="Voxel size">
        <output>5</output>
      </label>
    </div>
    <script type="module" src="main.js?v=free-space-20260523"></script>
  </body>
</html>
